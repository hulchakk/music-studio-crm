{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 mb-0">All Teachers</h1>
    <a href="{% url 'school:teacher-create' %}" class="btn btn-success d-flex align-items-center">
      <span class="mr-1">+</span> Add Teacher
    </a>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body p-3">
      <form action="" method="get" class="form-row align-items-end">
        <div class="col">
          {{ search_form|crispy }}
        </div>
        <div class="col-auto">
          <button type="submit" class="btn btn-primary px-4">🔎</button>
        </div>
      </form>
    </div>
  </div>

  <div class="list-group shadow-sm">
    {% for teacher in teacher_list %}
      <a href="{% url 'school:teacher-detail' pk=teacher.pk %}" 
         class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
        <div class="d-flex align-items-center">
          <div class="bg-light rounded-circle d-flex align-items-center justify-content-center mr-3" style="width: 40px; height: 40px;">
            👤
          </div>
          <span class="font-weight-bold text-dark">{{ teacher }}</span>
        </div>
        <span class="text-muted small">Details →</span>
      </a>
    {% empty %}
      <div class="list-group-item text-center py-4 text-muted">
        No teachers found.
      </div>
    {% endfor %}
  </div>
</div>

<style>
  .form-group { margin-bottom: 0 !important; }
</style>
{% endblock content %}
