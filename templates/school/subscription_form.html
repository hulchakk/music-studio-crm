{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>{{ object|yesno:"Edit,Add new" }}  subscription</h1>
  <form action="", method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <hr>
      <input type="submit" class="btn btn-success" value="{{ object|yesno:"Save,Add" }}">
      <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
      {% if object %}
        <a href="{% url 'school:subscription-delete' pk=subscription.pk %}" class="btn btn-danger">Delete</a>
      {% endif %}
  </form>
{% endblock content %}
