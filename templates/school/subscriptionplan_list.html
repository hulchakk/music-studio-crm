{% extends "base.html" %}

{% block content %}
  <h1>All plans</h1>
  <a href="{% url 'school:plan-create' %}" class="btn btn-success">+</a>
  <hr>
  <ul>
    {% for plan in subscriptionplan_list %}
      <li><a href="{% url 'school:plan-detail' pk=plan.pk %}">{{ plan }}</a></li>
    {% endfor %}
  </ul>
{% endblock content %}
